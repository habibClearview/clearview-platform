name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# Least privilege by default; the review job re-grants only what it needs.
permissions:
  contents: read

concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage
          path: coverage/

  ai-review:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff
        run: |
          git diff origin/main...HEAD > /tmp/pr.diff
          # Previously truncated to 8 KB — anything past the first ~150 lines of a
          # PR was never reviewed, so auth changes in large PRs sailed through.
          # Raised to 120 KB (well within the model's context); note when a PR
          # still exceeds it rather than silently dropping the rest.
          head -c 120000 /tmp/pr.diff > /tmp/pr_truncated.diff
          if [ "$(wc -c < /tmp/pr.diff)" -gt 120000 ]; then
            printf '\n\n[NOTE: diff exceeded 120KB and was truncated for this AI pass — rely on CodeRabbit for the full review.]\n' >> /tmp/pr_truncated.diff
          fi

      - name: AI Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # The script builds the request safely (json.dumps) and FAILS CLOSED:
        # any failure to obtain a real review is treated as BLOCKED, never
        # APPROVED. See .github/scripts/ai_review.py.
        run: python3 .github/scripts/ai_review.py

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat review.txt 2>/dev/null || echo "BLOCKED - The AI review step crashed before producing a result; failing closed. See the Action logs.")
          BODY=$(printf '## AI Code Review\n\n%s\n\n---\n*CRITICAL issues block merge. WARNINGS are informational.*' "$REVIEW")
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

      - name: Set status check
        if: always()
        run: |
          # Fail closed: the gate passes ONLY on an explicit success. An empty
          # or missing conclusion (e.g. the review step crashed) must fail, not
          # pass.
          if [ "${{ steps.review.outputs.conclusion }}" != "success" ]; then
            echo "AI review did not explicitly pass (conclusion='${{ steps.review.outputs.conclusion }}') — failing closed."
            exit 1
          fi
          echo "AI review passed."
